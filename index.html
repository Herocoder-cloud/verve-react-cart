<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verve — React Product Cart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="root">Loading...</div>

<script>
  window.onerror = function(msg, url, line, col, error) {
    document.getElementById('root').innerHTML =
      '<pre style="white-space:pre-wrap;padding:20px;color:#B00020;font-family:monospace;font-size:13px;">' +
      'ERROR: ' + msg + '\n' +
      'File: ' + url + '\n' +
      'Line: ' + line + ', Col: ' + col +
      '</pre>';
    return false;
  };
</script>

<!-- React + ReactDOM + Babel from CDN — lets this run as plain static
     files with no build step (no npm install needed). In a real job
     you'd normally use Vite/CRA + a build step instead; this project's
     README explains that trade-off. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="document.getElementById('root').innerText='FAILED TO LOAD: react.production.min.js from CDN'"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="document.getElementById('root').innerText='FAILED TO LOAD: react-dom.production.min.js from CDN'"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="document.getElementById('root').innerText='FAILED TO LOAD: babel.min.js from CDN'"></script>

<script type="text/babel" data-presets="react" src="app.jsx" onerror="document.getElementById('root').innerText='FAILED TO LOAD: app.jsx'"></script>
</body>
</html>
